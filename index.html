<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>E-commerce</title>
</head>
<body>
    <header class="header">
  <div class="header-container">
    <!-- Logo à esquerda -->
    <div class="logo">
      <a href="/">
        <img src="foto/minha_foto.png" class="logo-img">
      </a>
    </div>
    
    <!-- Barra de pesquisa no centro -->
    <div class="search-container">
      <form class="search-form">
        <input type="search" placeholder="Buscar produtos..." class="search-input">
        <button type="submit" class="search-btn"><i class='bx bx-search'></i></button>
      </form>
    </div>
    
    <!-- Usuário e login à direita -->
    <div class="user-actions">
      <a href="#" class="user-icon"><i class='bx bxs-user'></i></a>
      <a href="/login" class="login-btn">Entrar</a>
    </div>
  </div>
</header>

    
</body>
</html>
